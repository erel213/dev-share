services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devshare-backend
    environment:
      - PORT=8080
      - DB_FILE_PATH=/data/devshare.db
      - MIGRATIONS_PATH=./internal/infra/migrations/sqlite
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ADMIN_INIT_TOKEN=${ADMIN_INIT_TOKEN:-}
      - AWS_SECRET_ID=${AWS_SECRET_ID:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
      - AZURE_KEYVAULT_NAME=${AZURE_KEYVAULT_NAME:-}
      - GCP_SECRET_NAME=${GCP_SECRET_NAME:-}
      - TEMPLATE_STORAGE_PATH=/data/template_storage
      - ENV_EXECUTION_PATH=/data/env_executions
      - TF_PLUGIN_CACHE_DIR=/data/tf_plugin_cache
    volumes:
      - devshare-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devshare-frontend
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  devshare-data:
